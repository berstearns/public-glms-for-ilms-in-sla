# Variant 02 — vanilla GLM baseline.
# GLM (no learner-conditioning), single-token gap, clean cond-I context,
# continued-pretrain. Isolates blank-infilling vs learner-conditioning.

pipeline:
  order:
    - download-data
    - prepare-splits
    - gec-clean
    - build-cloze
    - train-ilm
    - infer
    - evaluate
    - plot-results
  stop_on_error: true

download-data:  !include ../pipeline/download-data.yaml
prepare-splits: !include ../pipeline/prepare-splits.yaml
gec-clean:      !include ../pipeline/gec-clean.yaml
evaluate:       !include ../pipeline/evaluate.yaml
plot-results:   !include ../pipeline/plot-results.yaml

build-cloze:
  data:  !include ../common/data.yaml
  cloze:
    gap_type: single_token
    span_length_lambda: 1.0
    span_max_length: 1
    mask_budget: 0.15
    num_gaps_per_text: 1
    context_condition: I
    synth_corruption_rate: 0.05
    l2_loci: [DET, PREP, VERB:FORM, VERB:SVA]
    exclude_sentence_initial: false

train-ilm:
  model: !include ../common/model/glm-base.yaml
  train: !include ../common/train/continued-pretrain.yaml
  conditioning:
    enabled: false
    include_l1: false
    include_cefr: false
    include_errprof: false
    errprof_num_clusters: 16
    unknown_token: UNK
  cloze:
    gap_type: single_token
    span_length_lambda: 1.0
    span_max_length: 1
    mask_budget: 0.15
    num_gaps_per_text: 1
    context_condition: I
    synth_corruption_rate: 0.05
    l2_loci: [DET, PREP, VERB:FORM, VERB:SVA]
    exclude_sentence_initial: false

infer:
  model:        !include ../common/model/glm-base.yaml
  infer:        !include ../common/infer.yaml
  conditioning:
    enabled: false
    include_l1: false
    include_cefr: false
    include_errprof: false
    errprof_num_clusters: 16
    unknown_token: UNK
  stage:
    items_jsonl: ""
    nwp_l2r: false
    mlm_length_unknown: false

experiment:
  name: "02-glm-vanilla"
  output_dir: ./artifacts
  save_config_snapshot: true
  verbose: false
  seed: 42
  device: cpu
